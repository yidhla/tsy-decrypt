name: Build ARM64
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: arm64v8/ubuntu:20.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          DEBIAN_FRONTEND=noninteractive apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y -qq python3 python3-pip python3-tk
          pip3 install pyinstaller -q
      - name: Build
        run: pyinstaller --onefile --clean --name tsy-decrypt tsy_decrypt_gui.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tsy-decrypt-arm64
          path: dist/tsy-decrypt
